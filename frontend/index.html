<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anxiety Detection AI</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

    <h1>AI Anxiety Monitor</h1>

    <div class="grid">

        <!-- Camera + Heatmap -->
        <div class="card camera-card">
            <h2>Live Feed</h2>
            <video id="video" autoplay></video>
            <img id="heatmap" />
        </div>

        <!-- Score -->
        <div class="card score-card">
            <h2>Live Score</h2>
            <div id="score" class="score">0</div>
            <p id="status">Normal</p>
            <p id="emotion">-</p>
        </div>

        <!-- Components -->
        <div class="card">
            <h2>Facial Signals</h2>
            <ul id="components"></ul>
        </div>

        <!-- Graph -->
        <div class="card full">
            <h2>Anxiety Trend</h2>
            <canvas id="chart"></canvas>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
