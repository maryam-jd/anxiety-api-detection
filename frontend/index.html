<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Anxiety Detection</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            opacity: 0.8;
        }

        input {
            margin: 20px 0;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: #00c9ff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00a6d6;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .loader {
            display: none;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🧠 Anxiety Detection</h1>
    <p>Upload an image to analyze facial stress level</p>

    <input type="file" id="fileInput"><br>

    <button onclick="upload()">Analyze</button>

    <div class="loader" id="loader">⏳ Processing...</div>

    <div id="result"></div>
</div>

<script>
async function upload() {
    const fileInput = document.getElementById("fileInput");
    const loader = document.getElementById("loader");
    const result = document.getElementById("result");

    const file = fileInput.files[0];

    if (!file) {
        alert("Please select a file");
        return;
    }

    loader.style.display = "block";
    result.innerText = "";

    const formData = new FormData();
    formData.append("file", file);

    try {
        const response = await fetch("http://127.0.0.1:8000/predict", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        loader.style.display = "none";

        result.innerText = "Result: " + JSON.stringify(data);

    } catch (error) {
        loader.style.display = "none";
        result.innerText = "Error connecting to server";
    }
}
</script>

</body>
</html>
